<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>斬 - Chanbara Online</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ====== ローディング ====== -->
  <div id="loading" class="overlay">
    <div class="paper">
      <div class="brush-title">斬</div>
      <div class="loading-text">読み込み中...</div>
    </div>
  </div>

  <!-- ====== メインメニュー ====== -->
  <div id="menu" class="overlay hidden">
    <div class="paper menu-paper">
      <div class="brush-title">斬</div>
      <div class="subtitle">- Chanbara Online -</div>

      <div class="name-input-row">
        <label>名前</label>
        <input type="text" id="player-name" maxlength="10" placeholder="武芸者" value="武芸者" />
      </div>

      <div class="menu-buttons">
        <button class="ink-btn" data-mode="ai">AI と 立ち合う</button>
        <button class="ink-btn" data-mode="host">部屋を 開く</button>
        <button class="ink-btn" data-mode="join">部屋に 入る</button>
        <button class="ink-btn" data-mode="practice">素振り (練習)</button>
      </div>

      <div class="footer-note">
        操作: <b>WASD</b>移動 / <b>マウス</b>視点 / <b>左クリック</b>斬撃 / <b>右クリック</b>受け / <b>Space</b>回避 / <b>Shift</b>強斬り
      </div>
    </div>
  </div>

  <!-- ====== 刀選択 ====== -->
  <div id="sword-select" class="overlay hidden">
    <div class="paper wide-paper">
      <div class="section-title">― 得物を 選べ ―</div>
      <div id="sword-list" class="sword-list"></div>
      <div class="row-buttons">
        <button class="ink-btn" id="sword-back">戻る</button>
        <button class="ink-btn primary" id="sword-confirm">これで 行く</button>
      </div>
    </div>
  </div>

  <!-- ====== ルームコード入力 ====== -->
  <div id="room-join" class="overlay hidden">
    <div class="paper">
      <div class="section-title">合言葉を 入れよ</div>
      <input type="text" id="room-code-input" maxlength="8" placeholder="ROOMCODE" />
      <div class="row-buttons">
        <button class="ink-btn" id="join-back">戻る</button>
        <button class="ink-btn primary" id="join-confirm">入る</button>
      </div>
      <div id="join-status" class="status-text"></div>
    </div>
  </div>

  <!-- ====== ホスト待機 ====== -->
  <div id="room-host" class="overlay hidden">
    <div class="paper">
      <div class="section-title">合言葉を 友に 伝えよ</div>
      <div id="host-code" class="room-code">----</div>
      <button class="ink-btn" id="copy-code">写す</button>
      <div id="host-status" class="status-text">相手の参加を待っています...</div>
      <div class="row-buttons">
        <button class="ink-btn" id="host-cancel">戻る</button>
      </div>
    </div>
  </div>

  <!-- ====== ゲームHUD ====== -->
  <div id="hud" class="hidden">
    <div class="hud-top">
      <div class="hp-block left">
        <div class="hp-name" id="hp-name-l">自分</div>
        <div class="hp-bar"><div class="hp-fill" id="hp-fill-l"></div></div>
      </div>
      <div class="round-info">
        <div class="round-text" id="round-text">第 一 番 勝負</div>
        <div class="score" id="score-text">0 - 0</div>
      </div>
      <div class="hp-block right">
        <div class="hp-name" id="hp-name-r">相手</div>
        <div class="hp-bar"><div class="hp-fill right" id="hp-fill-r"></div></div>
      </div>
    </div>

    <div class="hud-center">
      <div id="center-msg" class="center-msg"></div>
    </div>

    <div class="hud-bottom">
      <div class="controls-hint">
        <span><b>WASD</b> 移動</span>
        <span><b>左C</b> 斬</span>
        <span><b>右C</b> 受</span>
        <span><b>Shift+左C</b> 強斬</span>
        <span><b>Space</b> 回避</span>
        <span><b>ESC</b> 抜ける</span>
      </div>
    </div>
  </div>

  <!-- ====== 結果画面 ====== -->
  <div id="result" class="overlay hidden">
    <div class="paper">
      <div id="result-title" class="brush-title">勝</div>
      <div id="result-score" class="score-final">3 - 0</div>
      <div class="row-buttons">
        <button class="ink-btn primary" id="result-rematch">もう 一 度</button>
        <button class="ink-btn" id="result-menu">入口へ</button>
      </div>
    </div>
  </div>

  <!-- 3Dキャンバス -->
  <canvas id="game-canvas"></canvas>

  <!-- Three.js (CDN, importmap) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>
  <!-- PeerJS -->
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script type="module" src="game.js"></script>
</body>
</html>
