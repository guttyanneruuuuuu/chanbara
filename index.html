<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0e0c0a" />
<title>斬 - Chanbara 神 -</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ローディング -->
  <div id="loading" class="overlay">
    <div class="paper">
      <div class="brush-title">斬</div>
      <div class="loading-text">読み込み中...</div>
    </div>
  </div>

  <!-- メインメニュー -->
  <div id="menu" class="overlay hidden">
    <div class="paper menu-paper">
      <div class="brush-title">斬</div>
      <div class="subtitle">- 神 Chanbara -</div>

      <div class="name-input-row">
        <input type="text" id="player-name" maxlength="10" placeholder="武芸者" value="武芸者" />
      </div>

      <div class="menu-buttons">
        <button class="ink-btn big-tap" data-mode="ai">AI と 立ち合う</button>
        <button class="ink-btn big-tap" data-mode="practice">素振り (案山子)</button>
        <button class="ink-btn big-tap" data-mode="host">部屋を 開く</button>
        <button class="ink-btn big-tap" data-mode="join">部屋に 入る</button>
      </div>

      <div class="footer-note">
        画面を <b>指でスワイプ</b> して刀を振れ。<br>
        左下スティックで歩き、右ボタンで防御・回避・必殺。
      </div>
    </div>
  </div>

  <!-- 刀選択 -->
  <div id="sword-select" class="overlay hidden">
    <div class="paper wide-paper sword-paper">
      <div class="section-title">― 得物を 選べ ―</div>
      <div id="sword-list" class="sword-list"></div>
      <div id="sword-current" class="sword-current">選択中: <b id="sword-current-name">打刀</b></div>
      <div class="row-buttons sticky-buttons">
        <button class="ink-btn" id="sword-back">戻る</button>
        <button class="ink-btn primary big-tap" id="sword-confirm">これで 行く</button>
      </div>
    </div>
  </div>

  <!-- マップ選択 -->
  <div id="map-select" class="overlay hidden">
    <div class="paper wide-paper">
      <div class="section-title">― 戦場を 選べ ―</div>
      <div id="map-list" class="map-list"></div>
      <div id="map-current" class="sword-current">選択中: <b id="map-current-name">道場</b></div>
      <div class="row-buttons sticky-buttons">
        <button class="ink-btn" id="map-back">戻る</button>
        <button class="ink-btn primary big-tap" id="map-confirm">出陣</button>
      </div>
    </div>
  </div>

  <!-- ルームコード入力 -->
  <div id="room-join" class="overlay hidden">
    <div class="paper">
      <div class="section-title">合言葉を 入れよ</div>
      <input type="text" id="room-code-input" maxlength="8" placeholder="ROOMCODE" />
      <div class="row-buttons">
        <button class="ink-btn" id="join-back">戻る</button>
        <button class="ink-btn primary" id="join-confirm">入る</button>
      </div>
      <div id="join-status" class="status-text"></div>
    </div>
  </div>

  <!-- ホスト待機 -->
  <div id="room-host" class="overlay hidden">
    <div class="paper">
      <div class="section-title">合言葉を 友に 伝えよ</div>
      <div id="host-code" class="room-code">----</div>
      <button class="ink-btn" id="copy-code">写す</button>
      <div id="host-status" class="status-text">相手の参加を待っています...</div>
      <div class="row-buttons">
        <button class="ink-btn" id="host-cancel">戻る</button>
      </div>
    </div>
  </div>

  <!-- ゲームHUD -->
  <div id="hud" class="hidden">
    <div class="hud-top">
      <div class="hp-block left">
        <div class="hp-name" id="hp-name-l">自分</div>
        <div class="hp-bar"><div class="hp-fill" id="hp-fill-l"></div></div>
        <div class="bar-row">
          <div class="stam-bar"><div class="stam-fill" id="stam-fill-l"></div></div>
          <div class="ki-bar"><div class="ki-fill" id="ki-fill-l"></div></div>
        </div>
      </div>
      <div class="round-info">
        <div class="round-text" id="round-text">第 一 番</div>
        <div class="score" id="score-text">0 - 0</div>
        <div class="map-tag" id="map-tag">道場</div>
      </div>
      <div class="hp-block right">
        <div class="hp-name" id="hp-name-r">相手</div>
        <div class="hp-bar"><div class="hp-fill right" id="hp-fill-r"></div></div>
        <div class="bar-row right">
          <div class="stam-bar"><div class="stam-fill" id="stam-fill-r"></div></div>
          <div class="ki-bar"><div class="ki-fill" id="ki-fill-r"></div></div>
        </div>
      </div>
    </div>

    <div class="hud-center">
      <div id="center-msg" class="center-msg"></div>
    </div>

    <!-- バーチャルスティック (左下) -->
    <div id="stick-zone" class="stick-zone">
      <div id="stick-base" class="stick-base">
        <div id="stick-knob" class="stick-knob"></div>
      </div>
    </div>

    <!-- アクションボタン群 (右下) -->
    <div id="action-zone" class="action-zone">
      <button class="action-btn act-special" id="btn-special" title="必殺">必</button>
      <button class="action-btn act-guard" id="btn-guard" title="受け">受</button>
      <button class="action-btn act-dodge" id="btn-dodge" title="回避">避</button>
      <button class="action-btn act-item" id="btn-item" title="アイテム">薬</button>
      <button class="action-btn act-menu" id="btn-menu" title="抜ける">×</button>
    </div>

    <!-- アイテム小バー -->
    <div id="item-bar" class="item-bar"></div>
  </div>

  <!-- 結果画面 -->
  <div id="result" class="overlay hidden">
    <div class="paper">
      <div id="result-title" class="brush-title">勝</div>
      <div id="result-sub" class="subtitle">立 ち 合 い 終 了</div>
      <div id="result-score" class="score-final">3 - 0</div>
      <div id="result-stats" class="result-stats"></div>
      <div class="row-buttons">
        <button class="ink-btn primary big-tap" id="result-rematch">もう 一 度</button>
        <button class="ink-btn big-tap" id="result-menu">入口へ</button>
      </div>
    </div>
  </div>

  <canvas id="game-canvas"></canvas>
  <div id="hit-flash"></div>
  <div id="kill-vignette"></div>
  <div id="blood-overlay"></div>

  <!-- Three.js -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
    }
  }
  </script>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script type="module" src="game.js"></script>
</body>
</html>
